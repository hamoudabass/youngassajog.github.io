<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <link rel="icon" type="image/jpg" href="profile.jpg">
  <title>Hamoud Abass — @youngassajog</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300&family=Montserrat:wght@200;300;400&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --gold: #c9a84c;
      --gold-light: #e8d08a;
      --gold-dark: #8a6820;
      --black: #0a0a0a;
      --surface: #111111;
      --surface2: #1a1a1a;
      --text: #f0ead8;
      --muted: #7a7265;
    }

    html, body {
      min-height: 100%;
      background: var(--black);
      color: var(--text);
      font-family: 'Montserrat', sans-serif;
      font-weight: 300;
      overflow-x: hidden;
    }

    /* Ambient background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 40% at 50% 0%, rgba(201,168,76,0.12) 0%, transparent 70%),
        radial-gradient(ellipse 40% 60% at 80% 80%, rgba(138,104,32,0.08) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }

    /* Grain texture */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
      opacity: 0.5;
    }

    .container {
      position: relative;
      z-index: 1;
      max-width: 480px;
      margin: 0 auto;
      padding: 60px 24px 80px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* Avatar */
    .avatar-wrap {
      position: relative;
      margin-bottom: 28px;
      animation: fadeDown 0.9s ease both;
    }

    .avatar-ring {
      position: absolute;
      inset: -5px;
      border-radius: 50%;
      background: conic-gradient(var(--gold), var(--gold-dark), var(--gold-light), var(--gold));
      animation: spin 8s linear infinite;
    }

    .avatar-ring::after {
      content: '';
      position: absolute;
      inset: 3px;
      border-radius: 50%;
      background: var(--black);
    }

    .avatar {
      position: relative;
      z-index: 1;
      width: 100px;
      height: 100px;
      border-radius: 50%;
      object-fit: cover;
      display: block;
      border: 3px solid var(--black);
    }

    /* Name & bio */
    .name {
      font-family: 'Cormorant Garamond', serif;
      font-size: 2.2rem;
      font-weight: 300;
      letter-spacing: 0.08em;
      color: var(--text);
      text-align: center;
      animation: fadeDown 0.9s 0.15s ease both;
    }

    .handle {
      font-size: 0.7rem;
      font-weight: 200;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--gold);
      margin-top: 4px;
      margin-bottom: 14px;
      animation: fadeDown 0.9s 0.25s ease both;
    }

    .divider {
      width: 48px;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
      margin: 0 auto 16px;
      animation: fadeDown 0.9s 0.3s ease both;
    }

    .bio {
      font-size: 0.78rem;
      font-weight: 200;
      letter-spacing: 0.12em;
      color: var(--muted);
      text-align: center;
      margin-bottom: 48px;
      animation: fadeDown 0.9s 0.35s ease both;
    }

    /* Links */
    .links {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .link-btn {
      position: relative;
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 16px 22px;
      border: 1px solid rgba(201,168,76,0.2);
      border-radius: 2px;
      background: rgba(255,255,255,0.02);
      text-decoration: none;
      color: var(--text);
      overflow: hidden;
      transition: border-color 0.3s, transform 0.3s, background 0.3s;
      backdrop-filter: blur(4px);
      animation: fadeUp 0.7s ease both;
    }

    .link-btn:nth-child(1) { animation-delay: 0.4s; }
    .link-btn:nth-child(2) { animation-delay: 0.5s; }
    .link-btn:nth-child(3) { animation-delay: 0.6s; }
    .link-btn:nth-child(4) { animation-delay: 0.7s; }
    .link-btn:nth-child(5) { animation-delay: 0.8s; }
    .link-btn:nth-child(6) { animation-delay: 0.9s; }

    .link-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, rgba(201,168,76,0.06), transparent);
      opacity: 0;
      transition: opacity 0.3s;
    }

    .link-btn::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0;
      width: 0; height: 1px;
      background: linear-gradient(90deg, var(--gold), var(--gold-light));
      transition: width 0.4s ease;
    }

    .link-btn:hover {
      border-color: rgba(201,168,76,0.6);
      background: rgba(201,168,76,0.04);
      transform: translateX(4px);
    }

    .link-btn:hover::before { opacity: 1; }
    .link-btn:hover::after { width: 100%; }

    .icon-wrap {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(201,168,76,0.1);
      border: 1px solid rgba(201,168,76,0.25);
      flex-shrink: 0;
      transition: background 0.3s, border-color 0.3s;
    }

    .link-btn:hover .icon-wrap {
      background: rgba(201,168,76,0.2);
      border-color: var(--gold);
    }

    .icon-wrap svg {
      width: 18px;
      height: 18px;
      fill: var(--gold);
    }

    .link-label {
      flex: 1;
      font-size: 0.75rem;
      font-weight: 300;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--text);
    }

    .link-arrow {
      font-size: 0.8rem;
      color: var(--gold-dark);
      transition: color 0.3s, transform 0.3s;
    }

    .link-btn:hover .link-arrow {
      color: var(--gold);
      transform: translateX(3px);
    }

    /* Footer */
    .footer {
      margin-top: 60px;
      text-align: center;
      animation: fadeUp 0.7s 1.1s ease both;
    }

    .footer-divider {
      width: 30px;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--muted), transparent);
      margin: 0 auto 16px;
    }

    .footer p {
      font-size: 0.6rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--muted);
    }

    /* Animations */
    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
